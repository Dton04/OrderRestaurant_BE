name: CI - Backend (NestJS + Prisma) + Railway Auto Deploy

on:
  push:
    branches: [ main, develop ] # CI khi push
  pull_request:
    branches: [ main, develop ] # CI khi tạo PR
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Khớp với bản Node bạn đang dùng (v22.14.0)
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }} # Lấy từ GitHub Secrets

      - name: Run Build
        run: npm run build

      - name: Run Test
        run: npm test -- --passWithNoTests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
