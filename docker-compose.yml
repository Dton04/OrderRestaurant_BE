version: '3.8'

services:
  # 1. Database: PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: order_restaurant_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: order_restaurant
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - restaurant_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d order_restaurant"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend: NestJS + Prisma
  backend:
    build: ./backend
    container_name: order_restaurant_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy # Chờ DB thực sự sẵn sàng mới chạy App
    environment:
      # QUAN TRỌNG: localhost được thay bằng tên service 'postgres'
      DATABASE_URL: "postgresql://root:rootpassword@postgres:5432/order_restaurant?schema=public"
      PORT: 8080
    ports:
      - "8080:8080"
    # Lệnh để tự động cập nhật Database schema trước khi chạy App
    command: >
      sh -c "npx prisma migrate deploy && npm run start:prod"
    networks:
      - restaurant_network

  # 3. Frontend: React (Nginx)
  frontend:
    build: ./frontend
    container_name: order_restaurant_ui
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80" # Truy cập web tại http://localhost:3000
    networks:
      - restaurant_network

networks:
  restaurant_network:
    driver: bridge

volumes:
  db_data: